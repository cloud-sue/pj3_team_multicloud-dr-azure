spring.application.name=kbeauty
server.address=0.0.0.0

# DB 연결 설정 (MySQL/MariaDB 예시)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://db-server-pj.mysql.database.azure.com:3306/kbeauty?useSSL=true&serverTimezone=Asia/Seoul
spring.datasource.username=testuser
spring.datasource.password=qwert123!

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}

# JSON 응답 시 한글 깨짐 방지
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Green WAS only: Redis-backed HTTP session storage.
# 여러 was-green pod가 같은 JSESSIONID의 로그인 정보를 공유하기 위한 설정이다.
spring.session.store-type=redis
spring.session.redis.namespace=${SPRING_SESSION_REDIS_NAMESPACE:kbeauty:session}
server.servlet.session.timeout=${SERVER_SERVLET_SESSION_TIMEOUT:30m}

# 접속 정보는 Kubernetes redis-secret에서 환경 변수로 주입한다.
# Azure Managed Redis는 TLS 포트를 사용하므로 SSL을 켜야 한다.
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6380}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:true}
