# Source: whatap-operator/templates/operator-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatap-operator
  namespace: whatap-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "whatap-operator"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "whatap-operator"
    spec:
      serviceAccountName: whatap-operator
      containers:
        - name: operator
          image: "public.ecr.aws/whatap/whatap-operator:2.9.7"
          imagePullPolicy: Always
          command:
            - /manager
          ports:
            - containerPort: 9443
          resources:
            limits:
              cpu: 1
              memory: 1000Mi
            requests:
              cpu: 300m
              memory: 256Mi
          env:
            - name: WHATAP_DEFAULT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: WHATAP_LICENSE
              valueFrom:
                secretKeyRef:
                  name: whatap-credentials
                  key: WHATAP_LICENSE
            - name: WHATAP_HOST
              valueFrom:
                secretKeyRef:
                  name: whatap-credentials
                  key: WHATAP_HOST
            - name: WHATAP_PORT
              valueFrom:
                secretKeyRef:
                  name: whatap-credentials
                  key: WHATAP_PORT
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: false
      volumes:
        - name: webhook-certs
          emptyDir: {}
