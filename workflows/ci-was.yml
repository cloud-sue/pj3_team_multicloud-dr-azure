name: CI WAS

# WAS 코드 또는 WAS 배포 이미지 정의가 바뀐 PR에서만 실행한다.
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "app/was_blue/**"
      - "app/was_green/**"
      - "k8s/was/**"
      - "whatap/**"
      - ".github/workflows/ci-was.yml"
      # - ".github/workflows/citest.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-was-${{ github.ref }}
  cancel-in-progress: true

  # commit message에 "deploy"가 포함된 경우에만 이후 빌드/테스트 단계가 실행
jobs:
  commit-message-gate:
    name: Check deploy commit message
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        if: github.event_name == 'pull_request'
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Check latest commit message
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_MESSAGE="$(git log -1 --pretty=%B)"
          if printf '%s' "$COMMIT_MESSAGE" | grep -qi 'deploy'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # Spring Boot WAS blue/green 각각 Maven 테스트를 실행한다.
  was-test:
    name: WAS test (${{ matrix.color }})
    runs-on: ubuntu-latest
    needs: commit-message-gate
    if: needs.commit-message-gate.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - color: blue
            working-directory: app/was_blue
          - color: green
            working-directory: app/was_green

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Maven 테스트 실행을 위한 Java 17 환경을 준비하고 Maven 의존성을 캐시한다.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests
        working-directory: ${{ matrix.working-directory }}
        # Kubernetes Secret은 CI에 없으므로 local 프로필의 H2 DB로 테스트한다.
        env:
          SPRING_PROFILES_ACTIVE: local
        run: mvn test

  # 테스트 통과 후 WAS Docker 이미지가 정상 빌드되는지 확인한다.
  was-docker-build:
    name: WAS Docker build (${{ matrix.color }})
    runs-on: ubuntu-latest
    needs:
      - commit-message-gate
      - was-test
    if: needs.commit-message-gate.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - color: blue
            context: .
            dockerfile: k8s/was/image_build/blue/Dockerfile
            image: final-pj-was-blue:ci
          - color: green
            context: .
            dockerfile: k8s/was/image_build/green/Dockerfile
            image: final-pj-was-green:ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # CI 단계에서는 registry push 없이 Docker build 성공 여부만 검증한다.
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.image }}
