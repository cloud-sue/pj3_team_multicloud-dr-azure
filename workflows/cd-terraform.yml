name: CD Terraform

# main에 반영된 Terraform 변경을 Azure 인프라에 적용한다.
on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/cd-terraform.yml"
      # - ".github/workflows/citest.sh"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.14.7"
  TF_WORKING_DIR: "infra"
  # ACME DNS-01 인증서 발급에서 공개적으로 고정해도 되는 Terraform 변수입니다.
  # GitHub Actions에서는 azure/login이 만든 Azure CLI 세션을 ACME DNS challenge가 재사용합니다.
  TF_VAR_acme_azure_auth_method: "cli"
  TF_VAR_acme_dns_zone_name: "sue019522.shop"
  TF_VAR_appgw_ssl_hostname: "www.sue019522.shop"

concurrency:
  group: cd-terraform
  cancel-in-progress: false

jobs:
  apply-dev:
    name: Terraform apply dev
    runs-on: ubuntu-latest
    # commit message에 "deploy"가 포함된 경우에만
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message || '', 'deploy')
    # GitHub Environment dev에 required reviewer를 설정하면 apply 전에 수동 승인을 받을 수 있다.
    environment: dev
    concurrency:
      group: cd-terraform-dev
      cancel-in-progress: false
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # Azure Terraform이 AWS core remote state에서 CloudFront 도메인을 읽을 수 있도록 AWS 인증을 설정한다.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # GitHub OIDC로 Azure에 로그인한다. 아래 secret 3개가 repository 또는 dev environment에 등록되어 있어야 한다.
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false

      # provider.tf의 var.subscription_id와 DB admin 계정은 GitHub Secret 값을 Terraform 변수로 주입한다.
      # DB admin 계정은 Terraform이 MySQL과 Key Vault Secret(kbeauty-db-user/password)에 사용한다.
      - name: Terraform Apply
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_admin_username: ${{ secrets.DB_ADMIN_USERNAME }}
          TF_VAR_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
        run: terraform apply -input=false -auto-approve -var-file="terraform.tfvars"

  destroy-dev:
    name: Terraform destroy dev
    runs-on: ubuntu-latest
    # commit message에 "destroy"가 포함된 경우에만 Terraform destroy를 실행한다.
    if: github.event_name == 'push' && contains(github.event.head_commit.message || '', 'destroy')
    # destroy도 dev environment 승인을 거치도록 apply와 같은 보호 장치를 사용한다.
    environment: dev
    concurrency:
      group: cd-terraform-dev
      cancel-in-progress: false
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # Azure Terraform이 AWS core remote state에서 CloudFront 도메인을 읽을 수 있도록 AWS 인증을 설정한다.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # GitHub OIDC로 Azure에 로그인한다. destroy도 동일한 Azure 권한을 사용한다.
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false

      # External Secrets CRD가 이미 지워진 뒤에는 kubernetes_manifest refresh가 GVK 조회에서 실패할 수 있다.
      # destroy 전 state에서만 제거해 나머지 Azure 리소스 삭제가 계속 진행되게 한다.
      - name: Detach Kubernetes CRD-backed manifests from state
        run: terraform state rm 'kubernetes_manifest.external_secrets_cluster_secret_store[0]' || true

      # provider.tf의 var.subscription_id와 DB admin 계정은 destroy 시에도 variable validation을 통과하기 위해 필요하다.
      - name: Terraform Destroy
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_admin_username: ${{ secrets.DB_ADMIN_USERNAME }}
          TF_VAR_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
        run: terraform destroy -input=false -auto-approve -var-file="terraform.tfvars"
