name: CI WEB

# WEB 코드 또는 WEB 배포 이미지 정의가 바뀐 PR에서만 실행한다.
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "app/web_blue/**"
      - "app/web_green/**"
      - "k8s/web/**"
      - ".github/workflows/ci-web.yml"
      # - ".github/workflows/citest.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

  # commit message에 "deploy"가 포함된 경우에만 이후 빌드/테스트 단계가 실행
jobs:
  commit-message-gate:
    name: Check deploy commit message
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        if: github.event_name == 'pull_request'
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Check latest commit message
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_MESSAGE="$(git log -1 --pretty=%B)"
          if printf '%s' "$COMMIT_MESSAGE" | grep -qi 'deploy'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # React/Vite WEB blue/green 각각 의존성 설치 후 프로덕션 빌드를 검증한다.
  web-build:
    name: WEB build (${{ matrix.color }})
    runs-on: ubuntu-latest
    needs: commit-message-gate
    if: needs.commit-message-gate.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - color: blue
            working-directory: app/web_blue
          - color: green
            working-directory: app/web_green

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Vite 빌드에 사용할 Node.js 22 환경을 준비하고 npm 의존성을 캐시한다.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.working-directory }}
        run: npm run build

  # WEB Docker 이미지가 정상 빌드되는지 확인한다.
  web-docker-build:
    name: WEB Docker build (${{ matrix.color }})
    runs-on: ubuntu-latest
    needs:
      - commit-message-gate
      - web-build
    if: needs.commit-message-gate.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - color: blue
            context: app/web_blue
            dockerfile: k8s/web/image_build/blue/Dockerfile
            image: final-pj-web-blue:ci
          - color: green
            context: app/web_green
            dockerfile: k8s/web/image_build/green/Dockerfile
            image: final-pj-web-green:ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # CI 단계에서는 registry push 없이 Docker build 성공 여부만 검증한다.
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.image }}
