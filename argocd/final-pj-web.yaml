apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: final-pj-web
  namespace: argocd
spec:
  project: default

  # GitHub Actions가 image tag와 active color를 바꾸면 Argo CD가 이 path를 감지한다.
  source:
    repoURL: git@github.com:bespin-multi-cloud-3-azure/final_pj.git
    targetRevision: main
    path: k8s/web

  # Argo CD가 같은 AKS 안에 설치되어 있으므로 in-cluster API 주소를 사용한다.
  destination:
    server: https://kubernetes.default.svc
    namespace: app-web

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
