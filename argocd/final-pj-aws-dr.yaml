apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: final-pj-aws-dr
  namespace: argocd
spec:
  project: default

  # AWS DR용 EKS 매니페스트를 관리하는 repository입니다.
  # Argo CD에 이 repository 접근 권한이 등록되어 있어야 sync할 수 있습니다.
  source:
    repoURL: git@github.com:bespin-multi-cloud-3-azure/final_pj_aws.git
    targetRevision: main
    path: k8s

  # argocd cluster add 명령에서 --name aws-dr로 등록한 EKS 클러스터를 대상으로 배포합니다.
  destination:
    name: aws-dr
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
