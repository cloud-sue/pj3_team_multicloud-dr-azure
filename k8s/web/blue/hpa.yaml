apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-blue
  namespace: app-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-blue
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
