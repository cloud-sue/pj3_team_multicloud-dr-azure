apiVersion: apps/v1
kind: Deployment
metadata:
  name: was-blue
  namespace: app-was
spec:
  replicas: 2
  selector:
    matchLabels:
      app: was
      version: blue
  template:
    metadata:
      labels:
        app: was
        version: blue
    spec:
      nodeSelector:
        kubernetes.azure.com/agentpool: appnp
      containers:
        - name: was-container
          image: azsiskbeautyacr.azurecr.io/final-pj-was:blue-508d79a
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          env:
            - name: CLOUD_PROVIDER
              value: Azure
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: db-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: db-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: db-password
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
