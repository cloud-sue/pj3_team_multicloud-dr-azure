apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: was-green-hpa
  namespace: app-was
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: was-green
  minReplicas: 2
  maxReplicas: 5   #늘어나는 최대 한도
  metrics:
    - type: Resource
      resource:
        name: cpu   #cpu로 기준을 잡음
        target:
          type: Utilization
          averageUtilization: 60  #60프로, 2분 이상 시
  behavior:
    scaleUp:
      #2분간 CPU 높게 유지돼야 스케일 아웃 (JVM 워밍업 스파이크 무시)
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          # 60초마다 최대 1개씩 추가
          periodSeconds: 60
    scaleDown:
      #5분간 CPU 낮게 유지돼야 스케일in (잠깐 내려갔다고 바로 안줄이도록)
      stabilizationWindowSeconds: 300        